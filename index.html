<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse du Besoin & Tableurs - Technologie 3ème</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header class="app-header">
        <h1>📘 Analyse du Besoin & Tableurs</h1>
        <p class="subtitle">Technologie - Niveau 3ème</p>
    </header>

    <main class="container">
        <!-- ===================== SECTION 1 : COURS ===================== -->
        <section id="section-cours" class="card">
            <h2>📖 Cours synthétique</h2>
            <div id="contenu-cours"></div>
            <button id="btn-commencer-quiz" class="btn btn-primary">Commencer le Quiz de révision ➡️</button>
        </section>

        <!-- ===================== SECTION 2 : QUIZ ===================== -->
        <section id="section-quiz" class="card hidden">
            <h2>🧠 Quiz de compréhension</h2>
            <div class="quiz-header">
                <div class="info-bar">
                    <span id="quiz-progress">Question 1 / 5</span>
                    <span id="quiz-timer" class="timer">⏱️ 20:00</span>
                </div>
                <div class="progress-bar">
                    <div id="quiz-progress-bar" class="progress-fill"></div>
                </div>
            </div>
            <div id="quiz-question" class="question-box"></div>
            <div id="quiz-options" class="options-list"></div>
            <button id="btn-suivant-quiz" class="btn btn-primary hidden">Suivant ➡️</button>
        </section>

        <!-- ===================== SECTION 3 : ÉVALUATION ===================== -->
        <section id="section-eval" class="card hidden">
            <h2>📝 Évaluation (40 points)</h2>
            <div class="quiz-header">
                <div class="info-bar">
                    <span id="eval-progress">Exercice 1 / 5</span>
                    <span id="eval-timer" class="timer">⏱️ 01:00</span>
                </div>
                <div class="progress-bar">
                    <div id="eval-progress-bar" class="progress-fill"></div>
                </div>
            </div>
            <div id="eval-question" class="question-box"></div>
            <div id="eval-content" class="eval-content"></div>
            <button id="btn-suivant-eval" class="btn btn-primary">Valider et continuer ➡️</button>
        </section>

        <!-- ===================== RÉSULTATS ===================== -->
        <section id="pdf-report-area" class="card hidden">
            <h2>📊 Bilan des résultats</h2>
            <div id="resultats-detail"></div>
            <div class="actions-pdf">
                <button id="btn-telecharger-pdf" class="btn btn-success">📥 Télécharger le rapport PDF</button>
                <button id="btn-recommencer" class="btn btn-secondary">🔄 Recommencer</button>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <p>© 2026 - Application éducative Technologie 3ème</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
