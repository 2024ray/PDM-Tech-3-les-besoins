        <h1>📘 Analyse du Besoin</h1>
        <p class="subtitle">Technologie - Niveau 3ème</p>

            <button id="btn-commencer-quiz" class="btn btn-primary">Commencer le Quiz de révision ➡️</button>

        <section id="section-quiz" class="card hidden">
            <h2>🧠 Quiz de compréhension</h2>

                    <span id="quiz-progress">Question 1 / 5</span>
                    <span id="quiz-timer" class="timer">⏱️ 20:00</span>
                </div>
                <div class="progress-bar">
                    <div id="quiz-progress-bar" class="progress-fill"></div>

            <div id="quiz-options" class="options-list"></div>
            <button id="btn-suivant-quiz" class="btn btn-primary hidden">Suivant ➡️</button>

                    <span id="eval-progress">Exercice 1 / 15</span>

                    <div id="eval-progress-bar" class="progress-fill"></div>

            <div id="eval-content" class="eval-content"></div>
            <button id="btn-suivant-eval" class="btn btn-primary">Valider et continuer ➡️</button>

            <div id="resultats-detail"></div>
            <div class="actions-pdf">
                <button id="btn-telecharger-pdf" class="btn btn-success">📥 Télécharger le rapport PDF</button>
                <button id="btn-recommencer" class="btn btn-secondary">🔄 Recommencer</button>
            </div>
        </section>
