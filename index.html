<!-- ===== index.html ===== -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyse du Besoin & Tableurs - 3ème</title>
  <!-- html2pdf CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>📐 Analyse du Besoin & Tableurs</h1>
      <p class="subhead">Technologie 3ème - Révision, Quiz & Évaluation</p>
    </header>

    <!-- SECTION COURS -->
    <section id="cours-section" class="card">
      <h2>📘 Cours</h2>
      <div id="cours-content"></div>
    </section>

    <!-- SECTION QUIZ -->
    <section id="quiz-section" class="card">
      <h2>🧠 Quiz de compréhension <span class="badge timer-badge" id="quiz-timer">20:00</span></h2>
      <div class="progress-bar" id="quiz-progress"><div class="progress-fill" style="width:0%"></div></div>
      <div id="quiz-container"></div>
      <div class="quiz-nav">
        <button id="quiz-prev" disabled>◀ Précédent</button>
        <span id="quiz-counter">1 / 0</span>
        <button id="quiz-next">Suivant ▶</button>
      </div>
      <button id="quiz-submit" class="btn-primary" style="display:none;">📩 Valider le quiz</button>
      <div id="quiz-result" class="result-box"></div>
    </section>

    <!-- SECTION ÉVALUATION -->
    <section id="evaluation-section" class="card">
      <h2>📝 Évaluation (40 pts) <span class="badge timer-badge" id="eval-timer">01:00</span></h2>
      <div class="progress-bar" id="eval-progress"><div class="progress-fill" style="width:0%"></div></div>
      <div id="eval-container"></div>
      <div class="eval-nav">
        <button id="eval-prev" disabled>◀ Précédent</button>
        <span id="eval-counter">1 / 0</span>
        <button id="eval-next">Suivant ▶</button>
      </div>
      <button id="eval-submit" class="btn-primary" style="display:none;">📊 Finaliser l'évaluation</button>
      <div id="eval-result" class="result-box"></div>
    </section>

    <!-- ZONE BILAN PDF -->
    <div id="pdf-report-area" style="display:none;">
      <div id="pdf-content">
        <h2>📋 Bilan détaillé</h2>
        <div id="pdf-bilan"></div>
        <button id="download-pdf" class="btn-primary">⬇️ Télécharger le PDF</button>
      </div>
    </div>
  </div>

  <!-- JSON inline de secours -->
  <script type="application/json" id="fallback-json">
    {
      "titreGeneral": "Analyse du Besoin & Tableurs",
      "cours": {
        "introduction": "Un besoin est une sensation de privation ou d'insuffisance. Les objets techniques évoluent pour y répondre.",
        "sections": [
          {"titre": "La notion de Besoin", "contenu": "<p>Le besoin naît d'une <strong>privation</strong> ou d'une <strong>insuffisance</strong> (ex: faim, soif, besoin de se déplacer). Il est à l'origine de la création d'objets techniques.</p>"},
          {"titre": "Diagramme Bête à cornes", "contenu": "<p>Il répond à 3 questions : <br> <strong>À qui</strong> ? (utilisateur) <br> <strong>Sur quoi</strong> ? (matière d'œuvre) <br> <strong>Dans quel but</strong> ? (finalité).</p>"},
          {"titre": "Usage vs Estime", "contenu": "<p><strong>Valeur d'usage</strong> : utilité objective (ex: une voiture roule). <br> <strong>Valeur d'estime</strong> : subjective (ex: prestige, design).</p>"},
          {"titre": "Évolution des besoins", "contenu": "<p>Les besoins évoluent avec la société et les technologies. Un objet technique d'hier peut devenir obsolète.</p>"},
          {"titre": "Les Tableurs", "contenu": "<p>Une cellule est identifiée par colonne (A,B,...) et ligne (1,2,...). Les formules commencent par <code>=</code> : <code>=SOMME(A1:A5)</code>, <code>=MOYENNE(B2:B10)</code>, <code>=SI(C3>10;\"OK\";\"NON\")</code>.</p>"}
        ]
      },
      "quizComprehension": [
        {"question": "Un besoin est une sensation de privation.", "options": ["Vrai", "Faux"], "reponse": 0},
        {"question": "La valeur d'estime est objective.", "options": ["Vrai", "Faux"], "reponse": 1},
        {"question": "Le diagramme bête à cornes utilise 3 ovales.", "options": ["Vrai", "Faux"], "reponse": 0},
        {"question": "Les formules de tableur commencent par '='.", "options": ["Vrai", "Faux"], "reponse": 0},
        {"question": "Un besoin peut évoluer avec le temps.", "options": ["Vrai", "Faux"], "reponse": 0}
      ],
      "evaluation": [
        {"type": "qcm", "niveau": "Facile", "points": 4, "question": "Lequel de ces énoncés correspond à un besoin ?", "options": ["Avoir faim", "Aimer le bleu", "Courir vite", "Dormir"], "reponses": [0,3]},
        {"type": "association", "niveau": "Facile", "points": 6, "question": "Relie chaque concept à sa définition.", "paires": [{"terme": "Bête à cornes", "definitions": ["À qui ?", "Sur quoi ?", "Dans quel but ?"]}, {"terme": "Tableur", "definitions": ["Cellule", "Formule", "SOMME"]}]},
        {"type": "redaction", "niveau": "Moyen", "points": 10, "question": "Explique l'évolution du besoin de déplacement (ex: vélo électrique).", "motsCles": ["besoin", "évolution", "électrique"]},
        {"type": "tableur", "niveau": "Moyen", "points": 10, "question": "Complète la formule : =SOMME(___:C5)", "reponse": "C1"},
        {"type": "redaction", "niveau": "Avancé", "points": 10, "question": "Analyse complète d'un vidéoprojecteur : besoin, usage, estime, tableur (budget).", "motsCles": ["vidéoprojecteur", "besoin", "usage", "estime", "budget"]}
      ]
    }
  </script>

  <script src="script.js"></script>
</body>
</html>
